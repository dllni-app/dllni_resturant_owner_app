name: dllni_resturant_owner_app
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  common_package:
    path: common_package

  easy_localization: ^3.0.8
  flutter_bloc: ^9.1.1
  dio: ^5.9.1
  injectable: ^2.7.1+4
  get_it: ^8.2.0
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  awesome_notifications: ^0.11.0
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  toastification: ^3.0.3
  dotted_border: ^3.1.0
  image_picker: ^1.2.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geocoding: ^3.0.0
  path_provider: ^2.1.5
  flutter_svg: ^2.0.10
  url_launcher: ^6.3.1
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.7.1
  injectable_generator: ^2.12.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app_logo.png"

dependency_overrides:
  analyzer: ^10.0.1

flutter:

  uses-material-design: true

  assets:
    - assets/translations/
    - assets/images/

  fonts:
    - family: cairo
      fonts:
        - asset: assets/fonts/cairo.ttf
